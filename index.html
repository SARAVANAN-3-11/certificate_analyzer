<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Citadel Archivist Ledger</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1e222b;
            color: #ecf0f1;
            padding: 30px;
            max-width: 1200px;
            margin: 0 auto;
        }
        .container {
            background-color: #282c34;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        h1 { color: #D8B257; margin-top: 0; }
        .upload-section {
            margin: 20px 0;
            padding: 20px;
            border: 2px dashed #4f5b66;
            border-radius: 6px;
            text-align: center;
        }
        #status {
            margin: 15px 0;
            font-weight: bold;
            transition: color 0.3s ease;
        }
        #loader {
            display: none;
            width: 30px;
            height: 30px;
            border: 4px solid #f3f3f3;
            border-top: 4px solid #D8B257;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 10px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            display: none;
            background-color: #21252b;
        }
        th, td {
            border: 1px solid #4b5263;
            padding: 12px;
            text-align: left;
        }
        th { background-color: #abb2bf; color: #1e222b; }
        tr:nth-child(even) { background-color: #2c313c; }
        .btn {
            background-color: #D8B257;
            color: #1e222b;
            border: none;
            padding: 10px 20px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            display: none;
            margin-top: 15px;
        }
        .btn:hover { background-color: #e5c069; }
    </style>
</head>
<body>

<div class="container">
    <h1>The Maester's Scroll Ledger</h1>
    <p>Present your certificate scrolls to the Citadel archivist for automated logging.</p>
    
    <div class="upload-section">
        <input type="file" id="certificateInput" multiple accept="image/*">
        <p style="color: #abb2bf; font-size: 0.9em; margin-top: 8px;">You can select multiple certificate images at once</p>
    </div>

    <div id="loader"></div>
    <div id="status">Standing by for scrolls...</div>

    <button id="exportBtn" class="btn" onclick="exportTableToCSV('archived_ledger.csv')">Export Ledger to CSV</button>

    <table id="ledgerTable">
        <thead>
            <tr>
                <th>S.No</th>
                <th>Student Name</th>
                <th>Year/Sem</th>
                <th>Activity Name</th>
                <th>Venue/Host</th>
                <th>Date</th>
                <th>Award/Type</th>
            </tr>
        </thead>
        <tbody id="ledgerBody"></tbody>
    </table>
</div>

<script>
    // OPTIONAL LOCAL TESTING KEY: Paste a temporary key here to test locally. 
    // Clear this string out completely before committing to GitHub!
    const LOCAL_TEST_KEY = ""; 

    const sleep = (ms) => new Promise(resolve => setTimeout(resolve, ms));

    document.getElementById('certificateInput').addEventListener('change', async function(event) {
        const files = event.target.files;
        if (files.length === 0) return;

        const statusText = document.getElementById('status');
        const loader = document.getElementById('loader');
        const table = document.getElementById('ledgerTable');
        const tbody = document.getElementById('ledgerBody');

        loader.style.display = "block";
        let successCount = 0;
        let failCount = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            let fileProcessed = false;
            let retryCount = 0;
            
            statusText.innerText = `The Maesters are deciphering scroll ${i + 1} of ${files.length}...`;
            statusText.style.color = "#9BA0B5";

            const base64Data = await new Promise((resolve) => {
                const reader = new FileReader();
                reader.onloadend = () => resolve(reader.result.split(',')[1]);
                reader.readAsDataURL(file);
            });

            while (!fileProcessed && retryCount < 3) {
                try {
                    let response;
                    const promptText = `You are an expert academic archivist. Extract details from the provided certificate image. Use Title Case for studentName. If yearOrSem is missing, use 'N/A'. If award is just attendance/participation, use 'Participation'.`;

                    const payload = {
                        "contents": [{
                            "parts": [
                                { "text": promptText },
                                { "inline_data": { "mime_type": file.type, "data": base64Data } }
                            ]
                        }],
                        "generationConfig": {
                            "responseMimeType": "application/json",
                            "responseSchema": {
                                "type": "OBJECT",
                                "properties": {
                                    "studentName": { "type": "STRING" },
                                    "yearOrSem": { "type": "STRING" },
                                    "activityName": { "type": "STRING" },
                                    "venue": { "type": "STRING" },
                                    "date": { "type": "STRING" },
                                    "award": { "type": "STRING" }
                                },
                                "required": ["studentName", "yearOrSem", "activityName", "venue", "date", "award"]
                            }
                        }
                    };

                    // Check if running on deployed Netlify vs Local Computer
                    if (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") {
                        if (!LOCAL_TEST_KEY) {
                            throw new Error("Local testing key is missing. Add it to 'LOCAL_TEST_KEY' variables inside your script tag temporarily.");
                        }
                        const localUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=${LOCAL_TEST_KEY}`;
                        response = await fetch(localUrl, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    } else {
                        // Deployed on Netlify: Router fires up the custom edge route securely
                        response = await fetch('/api/decipher', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                    }

                    const responseData = await response.json();
                    
                    if (responseData.error) {
                        if (responseData.error.code === 429 || responseData.error.code === 503) {
                            retryCount++;
                            if (retryCount >= 3) {
                                throw new Error("Too many traffic jams. Giving up on this scroll.");
                            }
                            statusText.innerText = `Traffic jam at the Citadel! Waiting 6 seconds before retrying scroll ${i + 1}... (Attempt ${retryCount}/3)`;
                            statusText.style.color = "#D8B257"; 
                            await sleep(6000); 
                            continue; 
                        } else {
                            throw new Error(responseData.error.message);
                        }
                    }

                    let extractedText = responseData.candidates[0].content.parts[0].text;
                    extractedText = extractedText.replace(/^```json\s*/i, '').replace(/```$/, '').trim();
                    
                    const data = JSON.parse(extractedText);
                    const serialNumber = tbody.children.length + 1;

                    const row = `<tr>
                                    <td>${serialNumber}</td>
                                    <td>${data.studentName || 'N/A'}</td>
                                    <td>${data.yearOrSem || 'N/A'}</td>
                                    <td>${data.activityName || 'N/A'}</td>
                                    <td>${data.venue || 'N/A'}</td>
                                    <td>${data.date || 'N/A'}</td>
                                    <td>${data.award || 'N/A'}</td>
                                 </tr>`;
                    
                    tbody.insertAdjacentHTML('beforeend', row);
                    table.style.display = 'table';
                    document.getElementById('exportBtn').style.display = 'inline-flex';
                    
                    successCount++;
                    fileProcessed = true; 

                    if (i < files.length - 1) {
                        statusText.innerText = `Scroll ${i + 1} logged. Resting the ravens...`;
                        statusText.style.color = "#9BA0B5";
                        await sleep(3000); 
                    }

                } catch (error) {
                    console.error(`Failed to decipher ${file.name}:`, error);
                    
                    if (retryCount >= 2 || !error.message.includes("traffic jam")) {
                        fileProcessed = true; 
                        failCount++; 
                    } else {
                        retryCount++;
                        await sleep(3000);
                    }
                }
            }
        }

        loader.style.display = "none";
        
        if (successCount > 0 && failCount === 0) {
            statusText.innerText = `Success! All ${successCount} scrolls have been added to the ledger.`;
            statusText.style.color = "#4CAF50"; 
        } else if (successCount > 0 && failCount > 0) {
            statusText.innerText = `Finished. ${successCount} added, but ${failCount} ravens failed.`;
            statusText.style.color = "#ff9800"; 
        } else {
            statusText.innerText = `Failed. 0 scrolls added. Open your browser console (F12) to see the exact error.`;
            statusText.style.color = "#f44336"; 
        }

        event.target.value = "";
    });

    function exportTableToCSV(filename) {
        const table = document.getElementById("ledgerTable");
        let csv = [];
        for (let i = 0; i < table.rows.length; i++) {
            let row = [], cols = table.rows[i].querySelectorAll("td, th");
            for (let j = 0; j < cols.length; j++) {
                let data = cols[j].innerText.replace(/"/g, '""');
                row.push('"' + data + '"');
            }
            csv.push(row.join(","));
        }
        const csvFile = new Blob([csv.join("\n")], {type: "text/csv"});
        const downloadLink = document.createElement("a");
        downloadLink.download = filename;
        downloadLink.href = window.URL.createObjectURL(csvFile);
        downloadLink.style.display = "none";
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
    }
</script>

</body>
</html>
